<!DOCTYPE html>
<html lang="ru" data-theme="blue">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title data-i18n="app.title">Фитнес-тренер</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  
  <script>
    window.haptic = (style = 'medium') => {
      try {
        if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.HapticFeedback) {
          if (['error', 'success', 'warning'].includes(style)) {
            window.Telegram.WebApp.HapticFeedback.notificationOccurred(style);
          } else {
            window.Telegram.WebApp.HapticFeedback.impactOccurred(style);
          }
        } else if (navigator.vibrate) {
          navigator.vibrate([style === 'heavy' ? 50 : 20]);
        }
      } catch (e) {}
    };

    window.showToast = (message, type = 'success') => {
      const container = document.getElementById('toast-container');
      if (!container) return;
      const toast = document.createElement('div');
      
      let icon = type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️';
      let bg = type === 'error' ? 'bg-red-500/90' : 'bg-appCard/95 border border-white/10 shadow-[0_8px_30px_rgba(0,0,0,0.6)]';
      
      toast.className = `flex items-center gap-3 ${bg} text-white px-4 py-3 rounded-2xl transform translate-y-[-20px] opacity-0 transition-all duration-300 backdrop-blur-xl pointer-events-auto max-w-[90%] mx-auto`;
      toast.innerHTML = `<span class="text-xl shrink-0 drop-shadow-md">${icon}</span><span class="text-sm font-semibold tracking-wide flex-1 break-words">${message}</span>`;
      
      container.appendChild(toast);
      
      requestAnimationFrame(() => {
        toast.classList.remove('translate-y-[-20px]', 'opacity-0');
        toast.classList.add('translate-y-0', 'opacity-100');
        window.haptic('light');
      });

      setTimeout(() => {
        toast.classList.remove('translate-y-0', 'opacity-100');
        toast.classList.add('translate-y-[-20px]', 'opacity-0');
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    };
  </script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            appBg: '#0A0A0A',
            appCard: '#1A1A1A',
            appAccent: 'rgb(var(--color-accent-rgb) / <alpha-value>)',
            appAccentHover: 'rgb(var(--color-accent-hover-rgb) / <alpha-value>)',
          }
        }
      }
    }
    Chart.defaults.color = '#9ca3af';
    Chart.defaults.borderColor = 'rgba(255,255,255,0.05)';
    Chart.defaults.font.family = "'Inter', system-ui, sans-serif";
  </script>
  <link rel="stylesheet" href="styles.css">
  <script>
    const isMiniapps = false;

    const tgScript = document.createElement('script');
    tgScript.src = 'https://telegram.org/js/telegram-web-app.js';
    tgScript.onload = () => {
       if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.ready) {
          window.Telegram.WebApp.ready();
          window.Telegram.WebApp.expand();
       }
    };
    document.head.appendChild(tgScript);

    window.miniappsAI = window.miniappsAI || {
      callModel: async (args) => {
        const prompt = JSON.stringify(args.messages || []);
        if (prompt.includes('Алекс')) {
          return { output: [{ type: 'text', text: 'Для работы AI-тренера требуется бэкенд (Miniapps.ai). В текущей версии работает только демо-заглушка.' }] };
        }
        if (prompt.includes('Оцени реалистичный') || prompt.toLowerCase().includes('оцени реалистичный')) {
           return { output: [{ type: 'text', text: '{}' }] };
        }
        return { output: [{ type: 'text', text: '{"name": "Оффлайн еда", "cals": 250, "p": 15, "f": 10, "c": 25}' }] };
      },
      extractText: (res) => res.output[0].text,
      uploadFile: async () => ({ id: 'mock', path: '' })
    };

    window.miniappI18n = window.miniappI18n || {
      t: function(key, vars) { 
        let str = key.split('.').pop(); 
        if (vars) for (let k in vars) str = str.replace(new RegExp('{'+k+'}', 'g'), vars[k]);
        return str;
      }
    };
    
    document.addEventListener('DOMContentLoaded', async () => {
       try {
         const res = await fetch('locales/ru.json');
         if (res.ok) {
           const catalog = await res.json();
           window.miniappI18n.t = function(key, vars) {
              let str = key.split('.').reduce((o, i) => o ? o[i] : null, catalog) || key.split('.').pop();
              if (vars) for (let k in vars) str = str.replace(new RegExp('{'+k+'}', 'g'), vars[k]);
              return str;
           };
           document.querySelectorAll('[data-i18n]').forEach(el => {
              el.innerHTML = window.miniappI18n.t(el.getAttribute('data-i18n'));
           });
         }
       } catch(e) { console.warn('Не удалось загрузить локализацию', e); }
    });
  </script>
</head>

      <button data-tab="dashboard" class="nav-btn flex flex-col items-center py-2 px-1 text-gray-500 hover:text-white transition-colors flex-1 rounded-2xl">

        <span class="text-[9px] sm:text-[10px] font-semibold" data-i18n="app.nav_dashboard">Сводка</span>

        <svg class="w-6 h-6 mb-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
        <span class="text-[9px] sm:text-[10px] font-semibold" data-i18n="app.nav_workout">Спорт</span>
      </button>
      <button data-tab="nutrition" class="nav-btn flex flex-col items-center py-2 px-1 text-gray-500 hover:text-white transition-colors flex-1 rounded-2xl">
        <svg class="w-6 h-6 mb-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 2C12 2 11 3 11 4C11 5 12 6 12 6C12 6 13 5 13 4C13 3 12 2 12 2ZM8 6C5 6 3 8 3 11C3 16 8 22 12 22C16 22 21 16 21 11C21 8 19 6 16 6C14 6 12 8 12 8C12 8 10 6 8 6Z"></path></svg>
        <span class="text-[9px] sm:text-[10px] font-semibold" data-i18n="app.nav_nutrition">Еда</span>
      </button>
      <button data-tab="progress" class="nav-btn flex flex-col items-center py-2 px-1 text-gray-500 hover:text-white transition-colors flex-1 rounded-2xl">
        <svg class="w-6 h-6 mb-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
        <span class="text-[9px] sm:text-[10px] font-semibold" data-i18n="app.nav_progress">Прогресс</span>
      </button>
      <button data-tab="chat" class="nav-btn flex flex-col items-center py-2 px-1 text-gray-500 hover:text-white transition-colors flex-1 relative rounded-2xl">
        <svg class="w-6 h-6 mb-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
        <span class="text-[9px] sm:text-[10px] font-semibold" data-i18n="app.nav_chat">Тренер</span>
      </button>
    </nav>
  </div>
