  <script>
    // Global Haptic & Toast Helpers
    window.haptic = (style = 'medium') => {
      try {
        if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.HapticFeedback) {
          if (['error', 'success', 'warning'].includes(style)) {
            window.Telegram.WebApp.HapticFeedback.notificationOccurred(style);
          } else {
            window.Telegram.WebApp.HapticFeedback.impactOccurred(style); // 'light', 'medium', 'heavy', 'rigid', 'soft'
          }
        } else if (navigator.vibrate) {
          navigator.vibrate([style === 'heavy' ? 50 : 20]);
        }
      } catch (e) {}
    };

    window.showToast = (message, type = 'success') => {
      const container = document.getElementById('toast-container');
      if (!container) return;
      const toast = document.createElement('div');
      
      let icon = type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️';
      let bg = type === 'error' ? 'bg-red-500/90' : 'bg-appCard/95 border border-white/10 shadow-[0_8px_30px_rgba(0,0,0,0.6)]';
      
      toast.className = `flex items-center gap-3 ${bg} text-white px-4 py-3 rounded-2xl transform translate-y-[-20px] opacity-0 transition-all duration-300 backdrop-blur-xl pointer-events-auto max-w-[90%] mx-auto`;
      toast.innerHTML = `<span class="text-xl shrink-0 drop-shadow-md">${icon}</span><span class="text-sm font-semibold tracking-wide flex-1 break-words">${message}</span>`;
      
      container.appendChild(toast);
      
      // Animate in
      requestAnimationFrame(() => {
        toast.classList.remove('translate-y-[-20px]', 'opacity-0');
        toast.classList.add('translate-y-0', 'opacity-100');
        window.haptic('light');
      });

      // Animate out
      setTimeout(() => {
        toast.classList.remove('translate-y-0', 'opacity-100');
        toast.classList.add('translate-y-[-20px]', 'opacity-0');
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    };
  </script>

  <script>
    // =================================================================
    // АВТОМАТИЧЕСКАЯ НАСТРОЙКА ДЛЯ GITHUB PAGES И ТЕЛЕГРАМ
    // =================================================================
    const isMiniapps = window.location.hostname.includes('miniapps.ai');

    // 1. Подключаем Telegram SDK динамически
    // В Miniapps он блокируется CSP (и не нужен для превью), поэтому грузим только извне
    if (!isMiniapps) {
      const tgScript = document.createElement('script');
      tgScript.src = 'https://telegram.org/js/telegram-web-app.js';
      tgScript.onload = () => {
         if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.ready) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand();
         }
      };
      document.head.appendChild(tgScript);
    }

    // 2. Заглушки для Miniapps AI SDK (чтобы приложение работало без бэкенда)
    window.miniappsAI = window.miniappsAI || {
      callModel: async (args) => {
        const prompt = JSON.stringify(args.messages || []);
        if (prompt.includes('Алекс')) {
          return { output: [{ type: 'text', text: 'Для работы AI-тренера требуется бэкенд (Miniapps.ai). При экспорте на GitHub Pages запросы к ИИ работают в базовом демо-режиме без генерации реальных ответов.' }] };
        }
        if (prompt.includes('Оцени реалистичный') || prompt.toLowerCase().includes('оцени реалистичный')) {
           return { output: [{ type: 'text', text: '{}' }] }; // Fallback weights logic
        }
        return { output: [{ type: 'text', text: '{"name": "Оффлайн еда", "cals": 250, "p": 15, "f": 10, "c": 25}' }] };
      },
      extractText: (res) => res.output[0].text,
      uploadFile: async () => ({ id: 'mock', path: '' })
    };

    // 3. Полифилл для локализации (i18n)
    window.miniappI18n = window.miniappI18n || {
      t: function(key, vars) { 
        let str = key.split('.').pop(); 
        if (vars) for (let k in vars) str = str.replace(new RegExp('{'+k+'}', 'g'), vars[k]);
        return str;
      }
    };
    
    document.addEventListener('DOMContentLoaded', async () => {
       // Если мы всё же в Miniapps, SDK телеграма может быть доступно глобально
       if (isMiniapps && window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.ready) {
          window.Telegram.WebApp.ready();
          window.Telegram.WebApp.expand();
       }
       
       // Загрузка локализации из файла ru.json при экспорте
       if (!isMiniapps) {
          try {
            const res = await fetch('locales/ru.json');
            if (res.ok) {
              const catalog = await res.json();
              window.miniappI18n.t = function(key, vars) {
                 let str = key.split('.').reduce((o, i) => o ? o[i] : null, catalog) || key.split('.').pop();
                 if (vars) for (let k in vars) str = str.replace(new RegExp('{'+k+'}', 'g'), vars[k]);
                 return str;
              };
              // Переводим статические теги
              document.querySelectorAll('[data-i18n]').forEach(el => {
                 el.innerHTML = window.miniappI18n.t(el.getAttribute('data-i18n'));
              });
            }
          } catch(e) { console.warn('Не удалось загрузить локализацию', e); }
       }
    });
  </script>

  <!-- Кнопка для скачивания исходников (Добавлена для удобного экспорта) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <button id="dev-download-zip" class="fixed top-20 right-4 z-[9999] bg-appAccent/90 text-white px-4 py-2 rounded-2xl text-xs font-bold shadow-lg backdrop-blur hover:scale-105 active:scale-95 transition border border-white/20 flex items-center gap-2">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
    Скачать код (ZIP)
  </button>
  <script>
    document.getElementById('dev-download-zip').addEventListener('click', async function() {
      const btn = this;
      const originalHtml = btn.innerHTML;
      btn.innerHTML = '⏳ Архивируем...';
      try {
        const zip = new JSZip();
        
        // 1. Надежно сохраняем HTML код самого приложения (index.html)
        try {
          const htmlRes = await fetch(window.location.href);
          if (htmlRes.ok) {
            zip.file('index.html', await htmlRes.text());
          } else {
            throw new Error('Fallback to DOM');
          }
        } catch(e) {
          // Запасной вариант: если файл недоступен напрямую, берем его из DOM
          let domHtml = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
          zip.file('index.html', domHtml);
        }

        // 2. Список остальных файлов проекта
        const files = [
          'styles.css', 'main.js', 'miniapp.i18n.json',
          'js/data.js', 'js/views.js', 'js/view_progress.js', 'js/view_builder.js', 'js/chat_module.js',
          'locales/ru.json'
        ];
        
        for (let file of files) {
          try {
            const res = await fetch(file + '?v=' + Date.now()); // обход кэша
            if (res.ok) {
              const text = await res.text();
              zip.file(file, text);
            } else {
              console.warn('Пропущен файл: ' + file);
            }
          } catch (e) { console.error('Ошибка загрузки ' + file, e); }
        }
        
        const content = await zip.generateAsync({type:"blob"});
        const url = URL.createObjectURL(content);
        const a = document.createElement("a");
        a.href = url;
        a.download = "fitness-app-source.zip";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        
        btn.innerHTML = '✅ Скачано!';
        setTimeout(() => btn.innerHTML = originalHtml, 3000);
      } catch (err) {
        btn.innerHTML = '❌ Ошибка';
        console.error(err);
      }
    });
  </script>
