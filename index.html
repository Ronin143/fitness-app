<!DOCTYPE html>
<html lang="ru" data-theme="blue">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title data-i18n="app.title">Фитнес-тренер</title>
  
  <!-- Подключение внешних библиотек (Tailwind для стилей, Chart.js для графиков, html2canvas для скриншотов) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  
  <script>
    // Глобальные функции для вибрации (Haptic) и всплывающих уведомлений (Toast)
    window.haptic = (style = 'medium') => {
      try {
        if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.HapticFeedback) {
          if (['error', 'success', 'warning'].includes(style)) {
            window.Telegram.WebApp.HapticFeedback.notificationOccurred(style);
          } else {
            window.Telegram.WebApp.HapticFeedback.impactOccurred(style); // 'light', 'medium', 'heavy', 'rigid', 'soft'
          }
        } else if (navigator.vibrate) {
          navigator.vibrate([style === 'heavy' ? 50 : 20]);
        }
      } catch (e) {}
    };

    window.showToast = (message, type = 'success') => {
      const container = document.getElementById('toast-container');
      if (!container) return;
      const toast = document.createElement('div');
      
      let icon = type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️';
      let bg = type === 'error' ? 'bg-red-500/90' : 'bg-appCard/95 border border-white/10 shadow-[0_8px_30px_rgba(0,0,0,0.6)]';
      
      toast.className = `flex items-center gap-3 ${bg} text-white px-4 py-3 rounded-2xl transform translate-y-[-20px] opacity-0 transition-all duration-300 backdrop-blur-xl pointer-events-auto max-w-[90%] mx-auto`;
      toast.innerHTML = `<span class="text-xl shrink-0 drop-shadow-md">${icon}</span><span class="text-sm font-semibold tracking-wide flex-1 break-words">${message}</span>`;
      
      container.appendChild(toast);
      
      // Анимация появления
      requestAnimationFrame(() => {
        toast.classList.remove('translate-y-[-20px]', 'opacity-0');
        toast.classList.add('translate-y-0', 'opacity-100');
        window.haptic('light');
      });

      // Анимация скрытия и удаление
      setTimeout(() => {
        toast.classList.remove('translate-y-0', 'opacity-100');
        toast.classList.add('translate-y-[-20px]', 'opacity-0');
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    };
  </script>
  <script>
    // Настройка цветов для Tailwind CSS
    tailwind.config = {
      theme: {
        extend: {
          colors: {

    // Настройки по умолчанию для графиков Chart.js под тёмную тему
    Chart.defaults.color = '#9ca3af';
    Chart.defaults.borderColor = 'rgba(255,255,255,0.05)';
    Chart.defaults.font.family = "'Inter', system-ui, sans-serif";
  </script>
  
  <!-- Подключение кастомных стилей -->

  <script>
    // =================================================================
    // АВТОМАТИЧЕСКАЯ НАСТРОЙКА ДЛЯ GITHUB PAGES И ТЕЛЕГРАМ
    // =================================================================
    const isMiniapps = window.location.hostname.includes('miniapps.ai');

    // 1. Динамическое подключение Telegram SDK
    if (!isMiniapps) {
      const tgScript = document.createElement('script');
      tgScript.src = 'https://telegram.org/js/telegram-web-app.js';
      tgScript.onload = () => {
         if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.ready) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand();
         }
      };
      document.head.appendChild(tgScript);
    }

    // 2. Подключение реального API Gemini для GitHub Pages
    const GEMINI_API_KEY = "AIzaSyBoakIMlav113L8KqrcCM9Lfec5Ph5RjhE"; // <--- ВСТАВЬТЕ ВАШ КЛЮЧ СЮДА МЕЖДУ КАВЫЧЕК

    window.miniappsAI = window.miniappsAI || {
      callModel: async (args) => {
        if (!GEMINI_API_KEY) {
          return { output: [{ type: 'text', text: 'Пожалуйста, добавьте ваш API ключ Gemini в код (файл index.html, строка GEMINI_API_KEY).' }] };
        }

        let systemInstruction = null;
        const contents = [];

        // Форматируем сообщения под требования Google Gemini API
        for (const msg of args.messages) {
          if (msg.role === 'system') {
            systemInstruction = { parts: { text: msg.content } };
          } else {
            let textContent = '';
            if (Array.isArray(msg.content)) {
               textContent = msg.content.filter(c => c.type === 'text').map(c => c.text).join(' ');
            } else {
               textContent = msg.content;
            }
            contents.push({
              role: msg.role === 'assistant' ? 'model' : 'user',
              parts: [{ text: textContent }]
            });
          }
        }

        const body = { contents };
        if (systemInstruction) body.system_instruction = systemInstruction;

        try {
          const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
          });
          const data = await res.json();
          
          if (data.error) throw new Error(data.error.message);
          
          let reply = data.candidates?.[0]?.content?.parts?.[0]?.text || '{}';
          
          // Очистка от маркдауна, если ИИ вернул JSON
          if (reply.includes('```')) {
            reply = reply.replace(/```(json)?/g, '').trim();
          }

          return { output: [{ type: 'text', text: reply }] };
        } catch (e) {
          console.error("Gemini API Error:", e);
          const isTechCall = JSON.stringify(args.messages).includes('ТОЛЬКО валидный JSON');
          return { output: [{ type: 'text', text: isTechCall ? '{}' : 'Ошибка при запросе к Gemini: ' + e.message }] };
        }
      },
      extractText: (res) => res?.output?.[0]?.text || '',
      uploadFile: async () => ({ id: 'mock', path: '' }) // Загрузка фото напрямую в браузерной версии временно отключена
    };

    // 3. Полифилл для системы переводов (i18n)
    window.miniappI18n = window.miniappI18n || {
      t: function(key, vars) { 
        let str = key.split('.').pop(); 
        if (vars) for (let k in vars) str = str.replace(new RegExp('{'+k+'}', 'g'), vars[k]);
        return str;
      }
    };
    
    document.addEventListener('DOMContentLoaded', async () => {
       if (isMiniapps && window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.ready) {
          window.Telegram.WebApp.ready();
          window.Telegram.WebApp.expand();
       }
       
       // Загрузка переводов из файла ru.json при экспорте на GitHub Pages
       if (!isMiniapps) {
          try {
            const res = await fetch('locales/ru.json');
            if (res.ok) {
              const catalog = await res.json();
              window.miniappI18n.t = function(key, vars) {
                 let str = key.split('.').reduce((o, i) => o ? o[i] : null, catalog) || key.split('.').pop();
                 if (vars) for (let k in vars) str = str.replace(new RegExp('{'+k+'}', 'g'), vars[k]);
                 return str;
              };
              document.querySelectorAll('[data-i18n]').forEach(el => {
                 el.innerHTML = window.miniappI18n.t(el.getAttribute('data-i18n'));
              });
            }
          } catch(e) { console.warn('Не удалось загрузить локализацию', e); }
       }
    });
  </script>
</head>
